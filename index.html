<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkoedtGraphics | Portfolio</title>
<link rel="icon" type="image/png" href="SG logo transparent.png">

<style>
/* CSS Reset & Base Styles */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  cursor: default;
}

body {
  background-color: #050505;
  color: #f0f0f0;
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── AMBIENT LIGHT ─────────────────────────────────────────── */
#bg-light {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  will-change: background;
}

header, section, main, footer, .lightbox-overlay { position: relative; z-index: 1; }

a, button, .hover-target, .mosaic-item {
  cursor: pointer;
}

h1, h2, h3 {
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 800;
}

/* ── HEADER ────────────────────────────────────────────────── */
header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 25px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
  transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
}

header.scrolled {
  background: rgba(5, 5, 5, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 18px 50px;
}

.logo {
  display: flex;
  align-items: center;
  text-decoration: none;
  gap: 15px;
}

.logo-img { height: 40px; width: auto; }

.logo-text {
  color: #ffffff;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 4px;
}

nav a {
  color: #888;
  text-decoration: none;
  margin-left: 40px;
  font-size: 0.75rem;
  transition: color 0.4s ease;
  text-transform: uppercase;
  letter-spacing: 2px;
}

nav a:hover { color: #ffffff; }

/* ── HERO & INTERACTIVE TITLE ──────────────────────────────── */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 0 20px;
  overflow: hidden;
}

.hero h1 {
  font-size: 9vw;
  line-height: 0.9;
  margin-bottom: 20px;
  /* Base color for the text */
  color: rgba(255, 255, 255, 0.15); 
  position: relative;
  user-select: none;
}

/* This creates the "illuminated" layer */
.hero h1::before {
  content: 'VISUAL\a INNOVATION'; /* \a is a newline in CSS */
  white-space: pre;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  color: #ffffff;
  /* Mask follows the mouse via JS variables */
  mask-image: radial-gradient(
    circle 150px at var(--mouse-x) var(--mouse-y), 
    black 0%, 
    transparent 100%
  );
  -webkit-mask-image: radial-gradient(
    circle 150px at var(--mouse-x) var(--mouse-y), 
    black 0%, 
    transparent 100%
  );
  pointer-events: none;
  transition: opacity 0.5s ease;
  opacity: 0;
}

.hero:hover h1::before { opacity: 1; }

.hero p {
  font-size: 0.9rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #555;
  margin-top: 20px;
}

/* ── PORTFOLIO GRID ────────────────────────────────────────── */
.portfolio-section {
  padding: 120px 50px;
  max-width: 1800px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 80px;
}

.section-header h2 {
  font-size: 2.5rem;
  letter-spacing: 10px;
  color: #fff;
}

.mosaic-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 350px;
  gap: 20px;
}

.mosaic-item {
  position: relative;
  overflow: hidden;
  border-radius: 4px;
  background: #111;
}

.mosaic-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%) brightness(0.6);
  transition: all 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.mosaic-item:hover img {
  filter: grayscale(0%) brightness(1);
  transform: scale(1.03);
}

.span-2-col { grid-column: span 2; }
.span-2-row { grid-row: span 2; }

/* ── FOOTER ────────────────────────────────────────────────── */
footer {
  padding: 150px 50px;
  text-align: center;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.contact-link {
  font-size: 2rem;
  color: #fff;
  text-decoration: none;
  font-weight: 800;
  letter-spacing: -1px;
  transition: opacity 0.3s;
}

.contact-link:hover { opacity: 0.5; }

.reveal {
  opacity: 0;
  transform: translateY(30px);
  transition: all 1s ease-out;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

/* ── LIGHTBOX ──────────────────────────────────────────────── */
.lightbox-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
  z-index: 2000;
}

.lightbox-overlay.active { opacity: 1; pointer-events: all; }
.lightbox-overlay img { max-width: 90%; max-height: 80vh; }

@media (max-width: 768px) {
  .mosaic-grid { grid-template-columns: 1fr 1fr; grid-auto-rows: 250px; }
  .span-2-col, .span-2-row { grid-column: span 1; grid-row: span 1; }
  .hero h1 { font-size: 15vw; }
}
</style>
</head>
<body>

<div id="bg-light"></div>

<header id="main-header">
  <a href="#" class="logo">
    <img src="SG logo transparent.png" alt="SG Logo" class="logo-img">
    <span class="logo-text">SkoedtGraphics</span>
  </a>
  <nav>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1 id="interactive-title">VISUAL<br>INNOVATION</h1>
  <p>Magnus Skødt Larsen — Graphic Design & Video</p>
</section>

<main class="portfolio-section" id="work">
  <div class="section-header reveal">
    <h2>PROJECTS</h2>
  </div>
  
  <div class="mosaic-grid">
    <div class="mosaic-item span-2-col span-2-row reveal">
      <a href="aab2.png" class="lightbox-link"><img src="aab2.png" alt="Work"></a>
    </div>
    <div class="mosaic-item span-2-row reveal">
      <a href="marley.png" class="lightbox-link"><img src="marley.png" alt="Work"></a>
    </div>
    <div class="mosaic-item reveal">
      <a href="f1.png" class="lightbox-link"><img src="f1.png" alt="Work"></a>
    </div>
    <div class="mosaic-item reveal">
      <a href="lac.PNG" class="lightbox-link"><img src="lac.PNG" alt="Work"></a>
    </div>
    <div class="mosaic-item span-2-col reveal">
      <a href="aab1.png" class="lightbox-link"><img src="aab1.png" alt="Work"></a>
    </div>
  </div>
</main>

<footer id="contact">
  <a href="mailto:magnusskoedtlarsen@hotmail.com" class="contact-link">START A PROJECT →</a>
  <p style="margin-top: 40px; color: #444; font-size: 0.7rem; letter-spacing: 2px;">© 2026 SKOEDTGRAPHICS</p>
</footer>

<div class="lightbox-overlay" id="lightbox">
  <img src="" alt="Full view">
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const title = document.getElementById('interactive-title');
  const hero = document.querySelector('.hero');

  // Track mouse for the title spotlight
  hero.addEventListener('mousemove', (e) => {
    const rect = title.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    title.style.setProperty('--mouse-x', `${x}px`);
    title.style.setProperty('--mouse-y', `${y}px`);
  });

  // Background Ambient Light Animation
  const bgLight = document.getElementById('bg-light');
  let elapsed = 0;
  function animateLight() {
    elapsed += 0.01;
    const x = 50 + Math.sin(elapsed) * 20;
    const y = 50 + Math.cos(elapsed * 0.8) * 20;
    bgLight.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(255,255,255,0.05) 0%, transparent 50%)`;
    requestAnimationFrame(animateLight);
  }
  animateLight();

  // Scroll Reveal
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('active');
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = lightbox.querySelector('img');
  document.querySelectorAll('.lightbox-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      lightboxImg.src = link.href;
      lightbox.classList.add('active');
    });
  });
  lightbox.addEventListener('click', () => lightbox.classList.remove('active'));

  // Header scroll
  window.addEventListener('scroll', () => {
    const header = document.getElementById('main-header');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  });
});
</script>
</body>
</html>
