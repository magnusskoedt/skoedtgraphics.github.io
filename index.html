<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkoedtGraphics | Portfolio</title>
    
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            cursor: default;
        }

        body {
            background-color: #050505;
            color: #f0f0f0;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography */
        h1, h2, h3 {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 15px;
        }

        .logo-img { height: 40px; }
        .logo-text { color: #ffffff; font-size: 0.85rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }

        nav a {
            color: #888;
            text-decoration: none;
            margin-left: 40px;
            font-size: 0.75rem;
            transition: color 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        nav a:hover { color: #ffffff; }

        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 { font-size: 8vw; line-height: 1; }
        
        /* Video Carousel Section (The "Cover Flow" Look) */
        .video-section {
            padding: 100px 0;
            overflow: hidden;
            perspective: 1200px; /* Essential for 3D depth */
        }

        .section-header { text-align: center; margin-bottom: 60px; }

        .carousel-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 500px;
            width: 100%;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .carousel-slide {
            position: absolute;
            width: 320px; /* Vertical card style like your image */
            height: 480px;
            border-radius: 30px;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.2, 0, 0.2, 1);
            background: #111;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            opacity: 0.3;
            filter: blur(8px) grayscale(50%);
            transform: scale(0.7) translateX(0);
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .carousel-slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Active Slide (The center one) */
        .carousel-slide.active {
            opacity: 1;
            filter: blur(0) grayscale(0%);
            transform: scale(1.1) translateX(0);
            z-index: 10;
            pointer-events: all;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Positions for left/right slides */
        .carousel-slide.prev-1 { transform: scale(0.85) translateX(-350px); opacity: 0.5; z-index: 5; filter: blur(4px); }
        .carousel-slide.next-1 { transform: scale(0.85) translateX(350px); opacity: 0.5; z-index: 5; filter: blur(4px); }
        .carousel-slide.prev-2 { transform: scale(0.7) translateX(-650px); opacity: 0.2; z-index: 1; }
        .carousel-slide.next-2 { transform: scale(0.7) translateX(650px); opacity: 0.2; z-index: 1; }

        /* Carousel Navigation Buttons */
        .carousel-controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 50px;
            transform: translateY(-50%);
            z-index: 20;
            pointer-events: none;
        }

        .carousel-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            pointer-events: all;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .carousel-btn:hover { background: #fff; color: #000; }

        .carousel-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* Portfolio (Mosaic remains the same) */
        .portfolio-section { padding: 120px 50px; max-width: 1800px; margin: 0 auto; }
        .mosaic-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 350px; gap: 15px; }
        .mosaic-item { position: relative; overflow: hidden; background-color: #111; }
        .mosaic-item img { width: 100%; height: 100%; object-fit: cover; }
        .span-2-col { grid-column: span 2; }
        .span-2-row { grid-row: span 2; }

        footer { text-align: center; padding: 100px; border-top: 1px solid rgba(255, 255, 255, 0.05); }

        @media (max-width: 768px) {
            .carousel-slide { width: 260px; height: 400px; }
            .carousel-slide.prev-1 { transform: scale(0.8) translateX(-200px); }
            .carousel-slide.next-1 { transform: scale(0.8) translateX(200px); }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">
        <img src="SG logo transparent.png" alt="SG Logo" class="logo-img">
        <span class="logo-text">SkoedtGraphics</span>
    </a>
    <nav>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>MOTION</h1>
</section>

<section class="video-section">
    <div class="section-header">
        <h2>Showreel</h2>
    </div>
    
    <div class="carousel-container">
        <div class="carousel-controls">
            <button class="carousel-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
            <button class="carousel-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>

        <div class="carousel-track" id="carouselTrack">
            <div class="carousel-slide"><video loop muted playsinline src="rover.mp4"></video></div>
            <div class="carousel-slide"><video loop muted playsinline src="video2.mp4"></video></div>
            <div class="carousel-slide"><video loop muted playsinline src="video3.mp4"></video></div>
            <div class="carousel-slide"><video loop muted playsinline src="video4.mp4"></video></div>
            <div class="carousel-slide"><video loop muted playsinline src="video5.mp4"></video></div>
        </div>
    </div>
</section>

<main class="portfolio-section" id="work">
    <div class="mosaic-grid">
        <div class="mosaic-item span-2-col span-2-row"><img src="aab2.png" alt=""></div>
        <div class="mosaic-item span-2-row"><img src="marley.png" alt=""></div>
        <div class="mosaic-item span-2-row"><img src="f1.png" alt=""></div>
        <div class="mosaic-item span-2-col"><img src="lac.PNG" alt=""></div>
    </div>
</main>

<footer>
    <p class="copyright">&copy; 2026 SKOEDTGRAPHICS</p>
</footer>

<script>
    const track = document.getElementById('carouselTrack');
    const slides = Array.from(track.children);
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    let currentIndex = 0;

    function updateCarousel() {
        slides.forEach((slide, index) => {
            slide.className = 'carousel-slide'; // Reset
            const video = slide.querySelector('video');
            video.pause();

            if (index === currentIndex) {
                slide.classList.add('active');
                video.play(); // Auto-play the focused video
            } else if (index === (currentIndex + 1) % slides.length) {
                slide.classList.add('next-1');
            } else if (index === (currentIndex - 1 + slides.length) % slides.length) {
                slide.classList.add('prev-1');
            } else if (index === (currentIndex + 2) % slides.length) {
                slide.classList.add('next-2');
            } else if (index === (currentIndex - 2 + slides.length) % slides.length) {
                slide.classList.add('prev-2');
            }
        });
    }

    nextBtn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % slides.length;
        updateCarousel();
    });

    prevBtn.addEventListener('click', () => {
        currentIndex = (currentIndex - 1 + slides.length) % slides.length;
        updateCarousel();
    });

    // Initialize
    updateCarousel();
</script>

</body>
</html>
