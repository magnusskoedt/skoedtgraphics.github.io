<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Portfolio | Graphic Design</title>
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            cursor: default;
        }

        body {
            background-color: #0a0a0c;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Interactive Elements */
        a, button, .hover-target, .char, .scroll-down-arrow, .mosaic-item {
            cursor: pointer;
        }

        /* Typography */
        h1, h2, h3 {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        /* Sticky Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 5px;
        }

        .logo-img {
            height: 55px;
            width: auto;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .logo-text {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .logo:hover .logo-img {
            transform: scale(1.1);
        }
        
        .logo:hover .logo-text {
            color: #ff3366;
        }

        nav a {
            color: #888;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: #ff3366;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
        }

        .hero h1 {
            font-size: 7vw;
            margin-bottom: 20px;
            line-height: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            perspective: 1000px;
        }

        .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(40px) rotateX(-90px);
            transition: all 0.7s cubic-bezier(0.2, 0.6, 0.2, 1);
            color: transparent;
            position: relative;
        }

        /* 🔥 UPDATED: stronger animated gradient */
        .char.active {
            opacity: 1;
            transform: translateY(0) rotateX(0);
            background: linear-gradient(120deg, #ffffff, #666, #ffffff, #aaa, #ffffff);
            background-size: 200% 200%;
            animation: gradientMove 6s ease-in-out infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }

        .hero p {
            font-size: 1.2rem;
            color: #ffffff;
            max-width: 600px;
            opacity: 0;
            transition: opacity 3.5s ease-in-out;

        }
        
        .hero p.visible {
			opacity: 0.8;
		}

        /* Scroll Down Arrow */
        .scroll-down-arrow {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }

        .scroll-down-arrow svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #ffffff;
            stroke-width: 2;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }

        /* Portfolio Section */
        .portfolio-section {
            padding: 100px 50px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 300px;
            gap: 20px;
        }

        .mosaic-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background-color: #1a1a1f;
        }

        .mosaic-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            filter: grayscale(40%);
        }

        .span-2-col { grid-column: span 2; }
        .span-2-row { grid-row: span 2; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .mosaic-item:hover img { transform: scale(1.08); filter: grayscale(0%); }
        .mosaic-item:hover .overlay { opacity: 1; }

        /* Video Section */
        .video-section {
            padding: 100px 50px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #1a1a1f;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 40px;
        }

        .video-container video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* Scroll Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .reveal.active { opacity: 1; transform: translateY(0); }

        footer {
            text-align: center;
            padding: 100px 50px;
            border-top: 1px solid #222;
            color: #555;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .mosaic-grid { grid-template-columns: repeat(2, 1fr); }
            .portfolio-section, .video-section { padding: 50px 20px; }
            header { padding: 15px 20px; }
            .logo-text { font-size: 0.8rem; letter-spacing: 1px; }
            .logo-img { height: 35px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <img src="SG logo transparent.png" alt="SG Logo" class="logo-img">
            <span class="logo-text">SKOEDTGRAPHICS</span>
        </a>
        <nav>
            <a href="#work">Work</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="hero" id="about">
        <h1>VISUAL INNOVATION</h1>
        <p class="reveal">Concept, design and execution by Magnus Skødt Larsen</p>
        
        <a href="#work" class="scroll-down-arrow">
            <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
    </section>

    <main class="portfolio-section" id="work">
        <h2 class="reveal" style="text-align:center; margin-bottom:50px;">Selected Works</h2>
        <div class="mosaic-grid">
            <div class="mosaic-item span-2-col span-2-row reveal">
                <img src="https://picsum.photos/800/800?random=1" alt="Project 1">
                <div class="overlay"><h3>Project Title</h3><p>Brand Identity</p></div>
            </div>
            <div class="mosaic-item reveal"><img src="https://picsum.photos/400/400?random=2"></div>
            <div class="mosaic-item span-2-row reveal"><img src="https://picsum.photos/400/800?random=3"></div>
            <div class="mosaic-item span-2-col reveal"><img src="https://picsum.photos/800/400?random=4"></div>
        </div>
    </main>

    <section class="video-section reveal">
        <h2>Video Showcase</h2>
        <div class="video-container">
            <video controls poster="https://picsum.photos/1200/675?grayscale">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </div>
    </section>

    <footer id="contact" class="reveal">
        <h2>Let's build something together.</h2>
        <br>
        <p><a href="mailto:hello@designlab.com" style="color:#ff3366; text-decoration:none;">hello@designlab.com</a></p>
        <br>
        <p>&copy; 2026 DESIGN.LAB</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const title = document.querySelector('.hero h1');
            const text = title.textContent;
            title.textContent = ''; 
            [...text].forEach((char, i) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.className = 'char';
                span.style.transitionDelay = `${i * 0.05}s`;
                title.appendChild(span);
            });
            setTimeout(() => {
                document.querySelectorAll('.char').forEach(c => c.classList.add('active'));
            }, 300);

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
