<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkoedtGraphics | Portfolio</title>
    
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            cursor: default;
        }

        body {
            background-color: #050505;
            color: #f0f0f0;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Interactive Elements */
        a, button, .hover-target, .char, .mosaic-item, .carousel-slide {
            cursor: pointer;
        }

        /* Typography */
        h1, h2, h3 {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 15px;
        }

        .logo-img { height: 40px; }
        .logo-text { color: #ffffff; font-size: 0.85rem; letter-spacing: 4px; }

        nav a {
            color: #888;
            text-decoration: none;
            margin-left: 40px;
            font-size: 0.75rem;
            transition: color 0.4s ease;
            letter-spacing: 2px;
        }

        nav a:hover { color: #ffffff; }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 8vw;
            line-height: 1;
            margin-bottom: 20px;
        }

        .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.2, 0.6, 0.2, 1);
        }

        .char.active {
            opacity: 1;
            transform: translateY(0);
            background: linear-gradient(120deg, #fff, #999, #fff);
            background-size: 200% 200%;
            animation: metallicShine 8s ease-in-out infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes metallicShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- COVER FLOW VIDEO CAROUSEL --- */
        .video-section {
            padding: 100px 0;
            position: relative;
            perspective: 1500px;
            overflow: hidden;
        }

        .section-header { text-align: center; margin-bottom: 40px; }

        .carousel-container {
            position: relative;
            height: 650px; /* Adjusted for portrait video height */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .carousel-slide {
            position: absolute;
            width: 350px;
            aspect-ratio: 9 / 16; /* Fits actual portrait video size */
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            transform: scale(0.5) translateX(0) rotateY(0);
            filter: blur(10px);
            z-index: 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .carousel-slide video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures video fills the card */
        }

        /* States */
        .carousel-slide.active {
            opacity: 1;
            transform: scale(1.1) translateX(0) rotateY(0);
            filter: blur(0);
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .carousel-slide.prev-1 {
            opacity: 0.6;
            transform: scale(0.85) translateX(-380px) rotateY(25deg);
            filter: blur(4px);
            z-index: 5;
        }

        .carousel-slide.next-1 {
            opacity: 0.6;
            transform: scale(0.85) translateX(380px) rotateY(-25deg);
            filter: blur(4px);
            z-index: 5;
        }

        .carousel-slide.prev-2 {
            opacity: 0.2;
            transform: scale(0.7) translateX(-700px) rotateY(45deg);
            z-index: 1;
        }

        .carousel-slide.next-2 {
            opacity: 0.2;
            transform: scale(0.7) translateX(700px) rotateY(-45deg);
            z-index: 1;
        }

        /* Controls */
        .carousel-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 20;
        }

        .carousel-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            pointer-events: all;
        }

        .carousel-btn:hover { background: #fff; color: #000; }
        .carousel-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* Portfolio Grid */
        .portfolio-section {
            padding: 120px 50px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 350px;
            gap: 15px;
        }

        .mosaic-item {
            position: relative;
            overflow: hidden;
            background-color: #111;
        }

        .mosaic-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
            filter: brightness(0.7);
        }

        .mosaic-item:hover img { transform: scale(1.05); filter: brightness(1); }
        .span-2-col { grid-column: span 2; }
        .span-2-row { grid-row: span 2; }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            opacity: 0;
            transition: 0.5s;
        }

        .mosaic-item:hover .overlay { opacity: 1; }

        footer {
            text-align: center;
            padding: 100px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: #555;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .carousel-slide { width: 280px; }
            .carousel-slide.prev-1 { transform: scale(0.8) translateX(-220px); }
            .carousel-slide.next-1 { transform: scale(0.8) translateX(220px); }
            .portfolio-section { padding: 50px 20px; }
            .mosaic-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">
        <img src="SG logo transparent.png" alt="SG Logo" class="logo-img">
        <span class="logo-text">SKOEDTGRAPHICS</span>
    </a>
    <nav>
        <a href="#work">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1 id="hero-title">VISUAL INNOVATION</h1>
    <p style="color: #666; letter-spacing: 2px;">CONCEPT & DESIGN</p>
</section>

<section class="video-section">
    <div class="section-header">
        <h2>Motion Works</h2>
    </div>
    
    <div class="carousel-container">
        <div class="carousel-track" id="carouselTrack">
            <div class="carousel-slide"><video loop playsinline controls src="rover.mp4"></video></div>
            <div class="carousel-slide"><video loop playsinline controls src="video2.mp4"></video></div>
            <div class="carousel-slide"><video loop playsinline controls src="video3.mp4"></video></div>
            <div class="carousel-slide"><video loop playsinline controls src="video4.mp4"></video></div>
            <div class="carousel-slide"><video loop playsinline controls src="video5.mp4"></video></div>
        </div>

        <div class="carousel-controls">
            <button class="carousel-btn" id="prevBtn"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
            <button class="carousel-btn" id="nextBtn"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>
    </div>
</section>

<main class="portfolio-section" id="work">
    <div class="mosaic-grid">
        <div class="mosaic-item span-2-col span-2-row">
            <img src="aab2.png" alt="">
            <div class="overlay"><h3>Player Poster</h3><p>Photoshop</p></div>
        </div>
        <div class="mosaic-item span-2-row">
            <img src="marley.png" alt="">
            <div class="overlay"><h3>Marley Art</h3><p>Design</p></div>
        </div>
        <div class="mosaic-item span-2-row">
            <img src="f1.png" alt="">
            <div class="overlay"><h3>F1 Concept</h3><p>Digital Art</p></div>
        </div>
        <div class="mosaic-item span-2-col">
            <img src="lac.PNG" alt="">
            <div class="overlay"><h3>Lacoste</h3><p>Campaign</p></div>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2026 SKOEDTGRAPHICS | ALL RIGHTS RESERVED</p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Hero Text Animation
        const title = document.getElementById('hero-title');
        const text = title.textContent;
        title.textContent = '';
        [...text].forEach((char, i) => {
            const span = document.createElement('span');
            span.textContent = char === ' ' ? '\u00A0' : char;
            span.className = 'char';
            span.style.transitionDelay = `${i * 0.05}s`;
            title.appendChild(span);
        });
        setTimeout(() => document.querySelectorAll('.char').forEach(c => c.classList.add('active')), 100);

        // Carousel Logic
        const track = document.getElementById('carouselTrack');
        const slides = Array.from(track.children);
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        let currentIndex = 0;

        function updateCarousel() {
            slides.forEach((slide, index) => {
                slide.className = 'carousel-slide';
                const video = slide.querySelector('video');
                
                // Audio Handling: Only the active slide should play
                if (index === currentIndex) {
                    slide.classList.add('active');
                    // We attempt to play. If it fails (blocked by browser), 
                    // it will wait for the user to click the video controls.
                    video.play().catch(() => {
                        console.log("Autoplay with audio blocked. User interaction required.");
                    });
                } else {
                    video.pause();
                    video.currentTime = 0; // Reset video when not active
                    
                    if (index === (currentIndex + 1) % slides.length) slide.classList.add('next-1');
                    else if (index === (currentIndex - 1 + slides.length) % slides.length) slide.classList.add('prev-1');
                    else if (index === (currentIndex + 2) % slides.length) slide.classList.add('next-2');
                    else if (index === (currentIndex - 2 + slides.length) % slides.length) slide.classList.add('prev-2');
                }
            });
        }

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % slides.length;
            updateCarousel();
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + slides.length) % slides.length;
            updateCarousel();
        });

        // Initialize carousel
        updateCarousel();
    });
</script>

</body>
</html>
